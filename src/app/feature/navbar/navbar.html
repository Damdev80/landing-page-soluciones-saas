<div class="w-full px-4 sm:px-8 h-16 flex items-center justify-between top-0 fixed z-50 bg-(--bg) backdrop-blur-lg bg-opacity-80 border-b border-(--card-ring)">
    <div class="flex items-center ">
      <img src="/assets/logo.jpeg" alt="Logo DevStudio" class="w-8 h-8 mr-2" />
      <a href="#" class="text-xs sm:text-sm font-bold tracking-tight text-primary-hover"
        >dev<span class="font-light">studio</span></a
      >
    </div>

    <nav class="hidden md:flex items-center gap-4 lg:gap-8 ">
      <a href="#" class="text-sm text-primary hover:text-primary-hover transition-colors duration-200"
        >Inicio</a
      >
      <a href="#" class="text-sm text-primary hover:text-primary-hover transition-colors duration-200"
        >Acerca de</a
      >
      <a href="#" class="text-sm text-primary hover:text-primary-hover transition-colors duration-200"
        >Trabajos</a
      >
      <button (click)="toggleTheme()" class="w-9 h-9 rounded-full ring-1 ring-(--card-ring) flex items-center justify-center text-primary-subtle hover:text-primary-hover transition-colors duration-200 cursor-pointer">
        @if (isDark()) {
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="5" /><path d="M12 1v2m0 18v2M4.22 4.22l1.42 1.42m12.72 12.72l1.42 1.42M1 12h2m18 0h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" /></svg>
        } @else {
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" /></svg>
        }
      </button>
      <a
        href="#"
        class="text-sm bg-primary-hover text-secondary px-5 py-2 rounded-full hover:opacity-80 transition-opacity duration-200"
        >Contacto</a
      >
    </nav>

    <!-- Mobile menu button -->
    <button class="md:hidden w-9 h-9 rounded-full ring-1 ring-(--card-ring) flex items-center justify-center text-primary-subtle hover:text-primary-hover">
      <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" /></svg>
    </button>
  </div>
