<section class="relative w-full py-16 sm:py-24 lg:py-32 overflow-hidden">
  <div class="max-w-6xl mx-auto px-4 sm:px-8">

    <div class="flex flex-col lg:flex-row gap-8 lg:gap-20">

      <div class="w-full lg:w-2/5 flex flex-col gap-6">
        <span class="text-xs font-medium tracking-widest text-primary-subtle uppercase">Hablemos</span>
        <h2 class="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight text-primary-hover leading-tight">Contáctanos</h2>
        <p class="text-sm sm:text-base text-primary leading-relaxed">
          ¿Tienes un proyecto en mente? Nos encantaría escucharte. Cuéntanos tu idea y te responderemos en menos de 24 horas.
        </p>

        <div class="flex flex-col gap-5 mt-4">
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-(--card-bg) ring-1 ring-(--card-ring) flex items-center justify-center text-sm text-primary-subtle">@</div>
            <div>
              <p class="text-xs text-primary-subtle">Email</p>
              <p class="text-sm text-primary-hover">hola&#64;devstudio.com</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-(--card-bg) ring-1 ring-(--card-ring) flex items-center justify-center text-sm text-primary-subtle">☎</div>
            <div>
              <p class="text-xs text-primary-subtle">Teléfono</p>
              <p class="text-sm text-primary-hover">+1 (555) 123-4567</p>
            </div>
          </div>
          <div class="flex items-center gap-4">
            <div class="w-10 h-10 rounded-xl bg-(--card-bg) ring-1 ring-(--card-ring) flex items-center justify-center text-sm text-primary-subtle">📍</div>
            <div>
              <p class="text-xs text-primary-subtle">Ubicación</p>
              <p class="text-sm text-primary-hover">Remoto — Global</p>
            </div>
          </div>
        </div>
      </div>

      <div class="w-full lg:w-3/5 relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-75 h-75 rounded-full bg-primary-hover/(--glow-opacity) blur-[100px] pointer-events-none"></div>
        
        <div class="relative rounded-3xl bg-(--card-bg) ring-1 ring-(--card-ring) p-6 sm:p-10">
          <form class="flex flex-col gap-6">
            
            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div class="flex flex-col gap-2">
                <label class="text-xs text-primary-subtle uppercase tracking-wider">Nombre</label>
                <input type="text" placeholder="Tu nombre" class="bg-primary/5 rounded-xl px-4 py-3 text-sm text-primary-hover placeholder-primary-subtle/50 ring-1 ring-(--card-ring) outline-none focus:ring-primary/40 transition-all duration-200" />
              </div>
              <div class="flex flex-col gap-2">
                <label class="text-xs text-primary-subtle uppercase tracking-wider">Email</label>
                <input type="email" placeholder="tu@email.com" class="bg-primary/5 rounded-xl px-4 py-3 text-sm text-primary-hover placeholder-primary-subtle/50 ring-1 ring-(--card-ring) outline-none focus:ring-primary/40 transition-all duration-200" />
              </div>
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs text-primary-subtle uppercase tracking-wider">Asunto</label>
              <input type="text" placeholder="¿En qué te podemos ayudar?" class="bg-primary/5 rounded-xl px-4 py-3 text-sm text-primary-hover placeholder-primary-subtle/50 ring-1 ring-(--card-ring) outline-none focus:ring-primary/40 transition-all duration-200" />
            </div>

            <div class="flex flex-col gap-2">
              <label class="text-xs text-primary-subtle uppercase tracking-wider">Mensaje</label>
              <textarea rows="5" placeholder="Cuéntanos sobre tu proyecto..." class="bg-primary/5 rounded-xl px-4 py-3 text-sm text-primary-hover placeholder-primary-subtle/50 ring-1 ring-(--card-ring) outline-none focus:ring-primary/40 transition-all duration-200 resize-none"></textarea>
            </div>

            <button type="submit" class="self-start text-sm bg-primary-hover text-secondary px-8 py-3 rounded-full hover:opacity-80 transition-opacity duration-200 font-medium">
              Enviar mensaje
            </button>

          </form>
        </div>
      </div>

    </div>
  </div>
</section>
